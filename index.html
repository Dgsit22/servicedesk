<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ServiceDesk — Sign In</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;font-family:'Inter',sans-serif;font-size:14px}

body{
  display:flex;align-items:center;justify-content:center;min-height:100vh;
  background:#e0e5ec;
}

/* ── Neumorphic helpers ── */
.nm-flat{
  background:#e0e5ec;
  box-shadow:6px 6px 12px #b8bec7, -6px -6px 12px #ffffff;
}
.nm-inset{
  background:#e0e5ec;
  box-shadow:inset 4px 4px 8px #b8bec7, inset -4px -4px 8px #ffffff;
}
.nm-pressed{
  background:#e0e5ec;
  box-shadow:inset 6px 6px 12px #b8bec7, inset -6px -6px 12px #ffffff;
}

/* ── Page card ── */
.card{
  background:#e0e5ec;
  box-shadow:20px 20px 40px #b8bec7, -20px -20px 40px #ffffff;
  border-radius:28px;
  padding:48px 44px;
  width:100%;max-width:420px;
}

/* ── Logo area ── */
.logo-wrap{
  display:flex;flex-direction:column;align-items:center;
  margin-bottom:36px;text-align:center;
}
.logo-icon{
  width:72px;height:72px;border-radius:20px;
  background:#e0e5ec;
  box-shadow:8px 8px 16px #b8bec7, -8px -8px 16px #ffffff;
  display:flex;align-items:center;justify-content:center;
  margin-bottom:18px;position:relative;
}
.logo-icon::after{
  content:'';
  position:absolute;inset:3px;
  border-radius:16px;
  background:linear-gradient(135deg,#FF1F8E 0%,#F5C800 50%,#1B4FBA 100%);
  opacity:.9;
}
.logo-icon svg{position:relative;z-index:1;fill:#fff}
.logo-title{font-size:22px;font-weight:700;color:#2d3748;letter-spacing:-.5px;margin-bottom:4px}
.logo-sub{font-size:12px;color:#94a3b8;font-weight:400;letter-spacing:.3px}

/* ── Section label ── */
.section-label{
  font-size:11px;font-weight:600;color:#94a3b8;
  letter-spacing:.08em;text-transform:uppercase;
  text-align:center;margin-bottom:20px;
}

/* ── Google button ── */
.btn-google{
  width:100%;padding:16px 20px;border-radius:14px;
  display:flex;align-items:center;justify-content:center;gap:12px;
  background:#e0e5ec;
  box-shadow:6px 6px 12px #b8bec7, -6px -6px 12px #ffffff;
  border:none;cursor:pointer;
  font-size:14px;font-weight:600;color:#2d3748;
  font-family:'Inter',sans-serif;letter-spacing:-.1px;
  transition:box-shadow .15s,transform .15s;
  position:relative;overflow:hidden;
}
.btn-google::before{
  content:'';position:absolute;inset:0;border-radius:14px;
  background:linear-gradient(135deg,rgba(255,31,142,.07),rgba(245,200,0,.07));
  opacity:0;transition:opacity .2s;
}
.btn-google:hover{
  box-shadow:8px 8px 16px #b8bec7,-8px -8px 16px #ffffff;
  transform:translateY(-1px);
}
.btn-google:hover::before{opacity:1}
.btn-google:active,
.btn-google.pressed{
  box-shadow:inset 4px 4px 8px #b8bec7,inset -4px -4px 8px #ffffff;
  transform:translateY(0);
}
.btn-google:disabled{opacity:.55;cursor:not-allowed;transform:none}

/* Spinner inside button */
.btn-spinner{
  display:none;width:18px;height:18px;
  border:2px solid rgba(45,55,72,.15);
  border-top-color:#1B4FBA;border-radius:50%;
  animation:spin .7s linear infinite;
  position:absolute;right:20px;
}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── Divider ── */
.divider{
  display:flex;align-items:center;gap:12px;
  margin:28px 0 20px;
}
.divider::before,.divider::after{
  content:'';flex:1;height:1px;
  background:linear-gradient(90deg,transparent,#c8cfd8,transparent);
}
.divider span{font-size:11px;color:#94a3b8;font-weight:500;white-space:nowrap}

/* ── Info pills ── */
.pills{display:flex;gap:10px;flex-wrap:wrap;justify-content:center;margin-top:28px}
.pill{
  padding:7px 14px;border-radius:20px;
  background:#e0e5ec;
  box-shadow:3px 3px 7px #b8bec7,-3px -3px 7px #ffffff;
  font-size:11px;font-weight:500;color:#64748b;
  display:flex;align-items:center;gap:6px;
}
.pill-dot{
  width:6px;height:6px;border-radius:50%;
  background:linear-gradient(135deg,#FF1F8E,#F5C800);
}

/* ── Status message ── */
#msg{
  margin-top:18px;padding:12px 16px;border-radius:12px;
  font-size:12px;font-weight:500;display:none;text-align:center;
  box-shadow:inset 3px 3px 6px #b8bec7,inset -3px -3px 6px #ffffff;
  color:#64748b;
}
#msg.ok{color:#059669}
#msg.err{color:#dc2626}

/* ── Footer ── */
.card-footer{
  margin-top:32px;
  padding-top:20px;
  border-top:1px solid rgba(148,163,184,.2);
  text-align:center;
}
.card-footer p{font-size:11px;color:#94a3b8;font-weight:400;line-height:1.6}
.card-footer strong{color:#FF1F8E;font-weight:600}

/* ── Page loader ── */
#page-loader{
  position:fixed;inset:0;background:#e0e5ec;
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:20px;
  z-index:100;transition:opacity .3s;
}
#page-loader.hide{opacity:0;pointer-events:none}
.loader-ring{
  width:64px;height:64px;border-radius:50%;
  background:#e0e5ec;
  box-shadow:8px 8px 16px #b8bec7,-8px -8px 16px #ffffff;
  display:flex;align-items:center;justify-content:center;
}
.loader-ring::after{
  content:'';width:36px;height:36px;border-radius:50%;
  border:3px solid transparent;
  border-top-color:#FF1F8E;border-right-color:#F5C800;
  animation:spin .8s linear infinite;
}
#page-loader p{font-size:12px;color:#94a3b8;font-weight:500;letter-spacing:.05em}
</style>
</head>
<body>

<!-- Loader -->
<div id="page-loader">
  <div class="loader-ring"></div>
  <p>Checking session…</p>
</div>

<!-- Card -->
<div class="card">
  <div class="logo-wrap">
    <div class="logo-icon">
      <svg width="28" height="28" viewBox="0 0 16 16">
        <path d="M2 3a1 1 0 011-1h4a1 1 0 011 1v4a1 1 0 01-1 1H3a1 1 0 01-1-1V3zm0 6a1 1 0 011-1h4a1 1 0 011 1v4a1 1 0 01-1 1H3a1 1 0 01-1-1V9zm6-6a1 1 0 011-1h4a1 1 0 011 1v4a1 1 0 01-1 1H9a1 1 0 01-1-1V3zm0 6a1 1 0 011-1h4a1 1 0 011 1v4a1 1 0 01-1 1H9a1 1 0 01-1-1V9z"/>
      </svg>
    </div>
    <div class="logo-title">ServiceDesk</div>
    <div class="logo-sub">IT Help Portal · Digiclarity</div>
  </div>

  <div class="section-label">Sign in to your account</div>

  <button class="btn-google" id="google-btn" onclick="googleSSO()">
    <svg width="20" height="20" viewBox="0 0 48 48" style="flex-shrink:0">
      <path fill="#EA4335" d="M24 9.5c3.2 0 5.9 1.1 8.1 3.2l6-6C34.5 3.2 29.7 1 24 1 14.9 1 7.2 6.4 3.8 14.1l7 5.4C12.5 13.2 17.8 9.5 24 9.5z"/>
      <path fill="#4285F4" d="M46.5 24.5c0-1.6-.1-3.1-.4-4.5H24v8.5h12.7c-.6 3-2.3 5.5-4.8 7.2l7.4 5.7c4.3-4 6.8-9.9 6.8-16.9z"/>
      <path fill="#FBBC05" d="M10.8 28.5c-.5-1.5-.8-3-.8-4.5s.3-3 .8-4.5l-7-5.4C2.5 17 1.5 20.4 1.5 24s1 7 2.3 9.9l7-5.4z"/>
      <path fill="#34A853" d="M24 46.5c5.7 0 10.5-1.9 14-5.1l-7.4-5.7c-1.9 1.3-4.4 2.1-6.6 2.1-6.2 0-11.5-3.7-13.2-9.3l-7 5.4C7.2 41.6 14.9 46.5 24 46.5z"/>
    </svg>
    <span id="btn-label">Continue with Google</span>
    <div class="btn-spinner" id="btn-spin"></div>
  </button>

  <div id="msg"></div>

  <div class="divider"><span>Use your company Google account</span></div>

  <div class="pills">
    <div class="pill"><div class="pill-dot" style="background:#FF1F8E"></div>Role-based access</div>
    <div class="pill"><div class="pill-dot" style="background:#F5C800"></div>Single sign-on</div>
    <div class="pill"><div class="pill-dot" style="background:#1B4FBA"></div>Zero password</div>
  </div>

  <div class="card-footer">
    <p>Powered by <strong>Supabase</strong> · Protected by Google OAuth 2.0</p>
  </div>
</div>

<script>
window.addEventListener('load', async () => {
  try {
    const session = await getSession();
    if (session) { await redirectByRole(session.user.id); return; }
  } catch(e) {}
  document.getElementById('page-loader').classList.add('hide');
});

async function googleSSO() {
  const btn = document.getElementById('google-btn');
  btn.disabled = true;
  btn.classList.add('pressed');
  document.getElementById('btn-label').style.opacity = '.4';
  document.getElementById('btn-spin').style.display = 'block';
  showMsg('Redirecting to Google…', 'ok');
  try {
    await db.auth.signInWithOAuth({
      provider: 'google',
      options: { redirectTo: BASE_URL + 'index.html' }
    });
  } catch(e) {
    showMsg('Error: ' + e.message, 'err');
    btn.disabled = false;
    btn.classList.remove('pressed');
    document.getElementById('btn-label').style.opacity = '1';
    document.getElementById('btn-spin').style.display = 'none';
  }
}

async function redirectByRole(uid) {
  const profile = await getProfile(uid);
  if (!profile) { await new Promise(r => setTimeout(r, 1000)); return redirectByRole(uid); }
  const map = { admin:'admin.html', technician:'technician.html', manager:'employee.html', tl:'employee.html' };
  location.href = map[profile.role] || 'employee.html';
}

function showMsg(text, type) {
  const el = document.getElementById('msg');
  el.textContent = text;
  el.className = type;
  el.style.display = '';
}
</script>
</body>
</html>
